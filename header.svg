<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mystical Background Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2b6b;stop-opacity:1" />
    </linearGradient>

    <!-- Mushroom Cap Gradient -->
    <radialGradient id="capGrad" cx="30%" cy="30%" r="90%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c70039;stop-opacity:1" />
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .text-title { font-family: 'Verdana', sans-serif; fill: #fff; font-weight: bold; font-size: 32px; text-anchor: middle; filter: url(#glow); }
      .text-sub { font-family: 'Verdana', sans-serif; fill: #e0b0ff; font-size: 14px; text-anchor: middle; letter-spacing: 2px; }
      
      .spore { fill: #fff; opacity: 0.6; animation: float 4s infinite ease-in-out; }
      .spore:nth-child(even) { animation-duration: 6s; animation-delay: 1s; }
      .spore:nth-child(3n) { animation-duration: 5s; animation-delay: 0.5s; }

      .mushroom-sway { animation: sway 4s infinite ease-in-out; transform-origin: bottom center; }
      .grass { fill: #150925; }

      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-40px) translateX(10px); opacity: 0; }
      }

      @keyframes sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1deg); }
      }
    </style>
  </defs>

  <!-- Background Sky -->
  <rect width="800" height="300" fill="url(#skyGrad)" />

  <!-- Moon -->
  <circle cx="700" cy="60" r="40" fill="#fffae0" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.3;0.2" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1" fill="#fff" opacity="0.8" />
  <circle cx="150" cy="80" r="1.5" fill="#fff" opacity="0.6" />
  <circle cx="300" cy="40" r="1" fill="#fff" opacity="0.7" />
  <circle cx="500" cy="90" r="1.2" fill="#fff" opacity="0.5" />
  <circle cx="750" cy="30" r="1" fill="#fff" opacity="0.8" />

  <!-- Ground / Grass Silhouette -->
  <path d="M0,250 Q200,240 400,260 T800,250 V300 H0 Z" class="grass" />
  
  <!-- Magic Spores Particles -->
  <g id="particles">
      <circle cx="200" cy="250" r="2" class="spore" />
      <circle cx="250" cy="260" r="1.5" class="spore" />
      <circle cx="600" cy="250" r="2" class="spore" />
      <circle cx="650" cy="270" r="1" class="spore" />
      <circle cx="400" cy="280" r="2" class="spore" />
      <circle cx="100" cy="270" r="1.5" class="spore" />
      <circle cx="750" cy="260" r="2" class="spore" />
  </g>

  <!-- Mushroom Left -->
  <g transform="translate(150, 260) scale(0.8)" class="mushroom-sway">
    <path d="M-15,0 Q-10,-50 -5,-60 H5 Q10,-50 15,0 Z" fill="#eee" /> <!-- Stem -->
    <path d="M-45,-45 Q0,-110 45,-45 Z" fill="url(#capGrad)" /> <!-- Cap -->
    <circle cx="-20" cy="-60" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="15" cy="-70" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="25" cy="-55" r="3" fill="#fff" opacity="0.9"/>
    <path d="M-15,-40 Q0,-30 15,-40" fill="none" stroke="#eee" stroke-width="3" /> <!-- Ring -->
  </g>

  <!-- Mushroom Right -->
  <g transform="translate(650, 270) scale(0.6)" class="mushroom-sway" style="animation-delay: -1s;">
    <path d="M-15,0 Q-10,-50 -5,-60 H5 Q10,-50 15,0 Z" fill="#eee" />
    <path d="M-45,-45 Q0,-110 45,-45 Z" fill="url(#capGrad)" />
    <circle cx="0" cy="-80" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="-25" cy="-60" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="20" cy="-60" r="4" fill="#fff" opacity="0.9"/>
    <path d="M-15,-40 Q0,-30 15,-40" fill="none" stroke="#eee" stroke-width="3" />
  </g>

  <!-- Main Mushroom Center (Slightly behind text) -->
  <g transform="translate(400, 270) scale(0.4)" opacity="0.8">
    <path d="M-15,0 Q-10,-50 -5,-60 H5 Q10,-50 15,0 Z" fill="#eee" />
    <path d="M-45,-45 Q0,-110 45,-45 Z" fill="url(#capGrad)" />
  </g>

  <!-- Text Content -->
  <text x="400" y="140" class="text-title">WELCOME</text>
  <text x="400" y="170" class="text-sub">TO MY MAGIC WORLD</text>
  
  <!-- Foreground Grass Details -->
  <path d="M20,300 L25,280 L30,300 M140,300 L145,285 L150,300 M660,300 L665,280 L670,300" stroke="#2d1b4e" stroke-width="2" fill="none"/>

</svg>
